<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .task-card {
            transition: transform 0.2s;
            border-left: 4px solid #007bff;
        }
        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .priority-high { border-left-color: #dc3545; }
        .priority-medium { border-left-color: #ffc107; }
        .priority-low { border-left-color: #28a745; }
        .status-todo { background-color: #fff3cd; }
        .status-in_progress { background-color: #d1ecf1; }
        .status-done { background-color: #d4edda; }
    </style>
</head>
<body>
    <div class="container-fluid py-4">
        <div class="row">
            <div class="col-12">
                <h1 class="text-center mb-4">
                    <i class="fas fa-tasks text-primary"></i> Task Manager
                </h1>
                
                <!-- Alert Messages -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                    <i class="fas fa-check-circle"></i> <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
                
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                    <i class="fas fa-exclamation-circle"></i> <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            </div>
        </div>
        
        <div class="row">
            <!-- Add Task Form -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0"><i class="fas fa-plus"></i> Add New Task</h5>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/tasks}" th:object="${newTask}" method="post">
                            <div class="mb-3">
                                <label for="title" class="form-label">Title *</label>
                                <input type="text" class="form-control" id="title" th:field="*{title}" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="description" class="form-label">Description</label>
                                <textarea class="form-control" id="description" th:field="*{description}" rows="3"></textarea>
                            </div>
                            
                            <div class="mb-3">
                                <label for="priority" class="form-label">Priority</label>
                                <select class="form-select" id="priority" th:field="*{priority}">
                                    <option value="LOW">Low</option>
                                    <option value="MEDIUM" selected>Medium</option>
                                    <option value="HIGH">High</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label for="dueDate" class="form-label">Due Date</label>
                                <input type="datetime-local" class="form-control" id="dueDate" th:field="*{dueDate}">
                            </div>
                            
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-plus"></i> Add Task
                            </button>
                        </form>
                    </div>
                </div>
                
                <!-- Filters -->
                <div class="card shadow mt-4">
                    <div class="card-header bg-secondary text-white">
                        <h6 class="mb-0"><i class="fas fa-filter"></i> Filters & Search</h6>
                    </div>
                    <div class="card-body">
                        <!-- Search -->
                        <form th:action="@{/tasks/search}" method="get" class="mb-3">
                            <div class="input-group">
                                <input type="text" class="form-control" name="keyword" placeholder="Search tasks..." th:value="${searchKeyword}">
                                <button class="btn btn-outline-secondary" type="submit">
                                    <i class="fas fa-search"></i>
                                </button>
                            </div>
                        </form>
                        
                        <!-- Status Filter -->
                        <form th:action="@{/tasks/filter}" method="get" class="mb-2">
                            <select name="status" class="form-select" onchange="this.form.submit()">
                                <option value="">All Status</option>
                                <option value="TODO" th:selected="${selectedStatus == 'TODO'}">To Do</option>
                                <option value="IN_PROGRESS" th:selected="${selectedStatus == 'IN_PROGRESS'}">In Progress</option>
                                <option value="DONE" th:selected="${selectedStatus == 'DONE'}">Done</option>
                            </select>
                        </form>
                        
                        <!-- Priority Filter -->
                        <form th:action="@{/tasks/filter}" method="get">
                            <select name="priority" class="form-select" onchange="this.form.submit()">
                                <option value="">All Priorities</option>
                                <option value="HIGH" th:selected="${selectedPriority == 'HIGH'}">High</option>
                                <option value="MEDIUM" th:selected="${selectedPriority == 'MEDIUM'}">Medium</option>
                                <option value="LOW" th:selected="${selectedPriority == 'LOW'}">Low</option>
                            </select>
                        </form>
                        
                        <a href="/" class="btn btn-sm btn-outline-primary w-100 mt-2">
                            <i class="fas fa-refresh"></i> Clear Filters
                        </a>
                    </div>
                </div>
            </div>
            
            <!-- Task List -->
            <div class="col-lg-8">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4>Tasks (<span th:text="${#lists.size(tasks)}">0</span>)</h4>
                </div>
                
                <div th:if="${#lists.isEmpty(tasks)}" class="text-center py-5">
                    <i class="fas fa-clipboard-list fa-3x text-muted mb-3"></i>
                    <h5 class="text-muted">No tasks found</h5>
                    <p class="text-muted">Add your first task to get started!</p>
                </div>
                
                <div class="row" th:if="${!#lists.isEmpty(tasks)}">
                    <div class="col-md-6 mb-3" th:each="task : ${tasks}">
                        <div class="card task-card h-100" 
                             th:classappend="'priority-' + ${#strings.toLowerCase(task.priority)} + ' status-' + ${#strings.toLowerCase(task.status)}">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-start mb-2">
                                    <h6 class="card-title mb-0" th:text="${task.title}">Task Title</h6>
                                    <div class="dropdown">
                                        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                                            <i class="fas fa-ellipsis-v"></i>
                                        </button>
                                        <ul class="dropdown-menu">
                                            <li><a class="dropdown-item" th:href="@{/tasks/{id}/edit(id=${task.id})}">
                                                <i class="fas fa-edit"></i> Edit
                                            </a></li>
                                            <li><hr class="dropdown-divider"></li>
                                            <li>
                                                <form th:action="@{/tasks/{id}/delete(id=${task.id})}" method="post" style="display: inline;">
                                                    <button type="submit" class="dropdown-item text-danger" 
                                                            onclick="return confirm('Are you sure you want to delete this task?')">
                                                        <i class="fas fa-trash"></i> Delete
                                                    </button>
                                                </form>
                                            </li>
                                        </ul>
                                    </div>
                                </div>
                                
                                <p class="card-text text-muted small" th:text="${task.description}" th:if="${task.description}">Description</p>
                                
                                <div class="d-flex justify-content-between align-items-center">
                                    <div>
                                        <span class="badge" th:classappend="${task.status == 'TODO'} ? 'bg-warning' : (${task.status == 'IN_PROGRESS'} ? 'bg-info' : 'bg-success')"
                                              th:text="${#strings.replace(task.status, '_', ' ')}">Status</span>
                                        <span class="badge" th:classappend="${task.priority == 'HIGH'} ? 'bg-danger' : (${task.priority == 'MEDIUM'} ? 'bg-warning' : 'bg-success')"
                                              th:text="${task.priority}">Priority</span>
                                    </div>
                                </div>
                                
                                <div class="mt-2">
                                    <small class="text-muted">
                                        <i class="fas fa-clock"></i> 
                                        Created: <span th:text="${#temporals.format(task.createdAt, 'MMM dd, yyyy HH:mm')}">Date</span>
                                    </small>
                                    <br th:if="${task.dueDate}">
                                    <small class="text-muted" th:if="${task.dueDate}">
                                        <i class="fas fa-calendar"></i> 
                                        Due: <span th:text="${#temporals.format(task.dueDate, 'MMM dd, yyyy HH:mm')}">Due Date</span>
                                    </small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
